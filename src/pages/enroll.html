<div id="site-container">
  <main class="main">
    <div class="py-8 py-lg-10">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-6">
            <h1 class="text-xxl mb-4">Enroll</h1>
            <p class="text-lg prose mb-6">
              Join the Giant Leap Foundation Medical Education Center to access self-paced GI education tailored to your
              interests and career stage.
            </p>
            <form action="#" method="post">
              <div class="mb-3">
                <label for="enroll-name" class="form-label">Full name</label>
                <input type="text" class="form-control" id="enroll-name" name="name" autocomplete="name" required />
              </div>
              <div class="mb-3">
                <label for="enroll-email" class="form-label">Email</label>
                <input type="email" class="form-control" id="enroll-email" name="email" autocomplete="email" required />
              </div>
              <div class="mb-3">
                <label for="enroll-organization" class="form-label">Organization</label>
                <input type="text" class="form-control" id="enroll-organization" name="organization" />
              </div>
              <button type="submit" class="btn btn-primary">Request enrollment</button>
            </form>
            <p class="text-md mt-4 mb-0">
              Already a member? <a href="login.html">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </main>
