<div id="site-container">
  <main class="main">
    <div class="py-8 py-lg-10">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-5">
            <div class="card bg-black-50 m-0">
              <div class="card-body">
                <h1 class="text-lg text-white mb-4">Member sign in</h1>
                <form action="#" method="post">
                  <div class="mb-3">
                    <label for="login-username" class="form-label text-white">Username</label>
                    <input
                      type="text"
                      class="form-control"
                      id="login-username"
                      name="username"
                      autocomplete="username"
                      required
                    />
                  </div>
                  <div class="mb-3">
                    <label for="login-password" class="form-label text-white">Password</label>
                    <input
                      type="password"
                      class="form-control"
                      id="login-password"
                      name="password"
                      autocomplete="current-password"
                      required
                    />
                  </div>
                  <button type="submit" class="btn btn-primary w-100">Sign in</button>
                </form>
                <p class="text-md text-white-75 mt-3 mb-0">
                  I'm not a member yet. <a href="enroll.html" class="text-white text-underline">Enroll me</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
