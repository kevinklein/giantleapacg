<div id="site-container">
  <main class="main icons-reference">
    <div class="py-8 py-lg-10">
      <div class="container">
        <h1 class="text-xxl mb-2">Sharp Icon Reference</h1>
        <p class="text-lg prose mb-4">
          Internal reference for Font Awesome Pro 7.1.0 Sharp sprites. Not linked in navigation.
        </p>

        <div class="icons-reference__controls">
          <label class="icons-reference__field">
            <span>Search</span>
            <input
              id="icons-search"
              class="form-control"
              type="search"
              placeholder="Filter by icon id..."
              autocomplete="off"
            />
          </label>

          <label class="icons-reference__field">
            <span>Weight</span>
            <select id="icons-weight" class="form-control">
              <option value="sharp-solid">Sharp Solid</option>
              <option value="sharp-regular">Sharp Regular</option>
              <option value="sharp-light">Sharp Light</option>
              <option value="sharp-thin">Sharp Thin</option>
            </select>
          </label>
        </div>

        <p id="icons-status" class="icons-reference__status" aria-live="polite"></p>

        <div id="icons-grid" class="icons-reference__grid" role="list"></div>
      </div>
    </div>
  </main>
</div>

<script src="icons-page.js"></script>
